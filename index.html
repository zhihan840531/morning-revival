var currentWeekIdx = 0; // 0-based
var currentDay = -1;

function getWeekData() { return ALL_WEEKS_DATA[currentWeekIdx]; }
function getDaysData() {
  var wd = getWeekData();
  return wd.days.map(function(d, i) {
    return {
      label: d.label,
      outlineWeekTitle: wd.weekTitle,
      outlineDay: '',
      outlineItems: [],
      feeding: d.feeding,
      message: d.message
    };
  });
}

var summaryCache = {};

function saveNote(idx, text) {
  try { localStorage.setItem('mr_note_' + getWeekData().weekId + '_' + idx, text); } catch(e) {}
}
function loadNote(idx) {
  try { return localStorage.getItem('mr_note_' + getWeekData().weekId + '_' + idx) || ''; } catch(e) { return ''; }
}

function renderWeekSelector() {
  var sel = document.getElementById('weekSelector');
  var labels = ['第一週','第二週','第三週','第四週','第五週','第六週'];
  sel.innerHTML = labels.map(function(l, i) {
    return '<button class="week-btn' + (i === currentWeekIdx ? ' active' : '') + '" onclick="switchWeek(' + i + ')">' + l + '</button>';
  }).join('');
}

function switchWeek(idx) {
  currentWeekIdx = idx;
  currentDay = -1;
  summaryCache = {};
  renderWeekSelector();
  updateWeekBar();
  renderTabs();
  renderOutlinePage();
  window.scrollTo(0, 0);
}

function updateWeekBar() {
  var bar = document.getElementById('weekBar');
  if (bar) {
    var title = getWeekData().weekTitle.split('\n')[0];
    bar.innerHTML = '2026年國殤節特會・<span style="color:var(--gold-dark);font-weight:500">' + title + '</span>';
  }
}

function renderTabs() {
  var outlineTab = '<div class="day-tab outline-tab' + (currentDay === -1 ? ' active' : '') + '" onclick="switchDay(-1)">綱目</div>';
  var dayTabs = getDaysData().map(function(d, i) {
    return '<div class="day-tab' + (i === currentDay ? ' active' : '') + '" onclick="switchDay(' + i + ')">' + d.label + '</div>';
  }).join('');
  document.getElementById('dayTabs').innerHTML = outlineTab + dayTabs;
}

function switchDay(idx) {
  currentDay = idx;
  document.querySelectorAll('.day-tab').forEach(function(t, i) {
    t.classList.toggle('active', i === 0 ? idx === -1 : idx === i - 1);
  });
  if (idx === -1) { renderOutlinePage(); } else { renderDay(idx); }
  window.scrollTo(0, 0);
}

function buildOutlineHTML(items) {
  if (!items || !items.length) return '';
  var html = '';
  items.forEach(function(item) {
    if (item.type === 'part') {
      html += '<div class="ol-part">';
      html += '<div class="ol-part-title">' + esc(item.text) + (item.ref ? ' <span class="ref-tag">—' + esc(item.ref) + '</span>' : '') + '</div>';
      if (item.children) html += buildOutlineHTML(item.children);
      html += '</div>';
    } else if (item.type === 'section') {
      html += '<div class="ol-section">';
      html += '<div class="ol-section-title">' + esc(item.text) + (item.ref ? ' <span class="ref-tag">—' + esc(item.ref) + '</span>' : '') + '</div>';
      if (item.children) html += buildOutlineHTML(item.children);
      html += '</div>';
    } else if (item.type === 'sub') {
      html += '<div class="ol-sub">';
      html += '<div class="ol-sub-title"><span style="color:var(--gold-dark);margin-right:4px">' + esc(item.num) + '</span>' + esc(item.text) + (item.ref ? ' <span class="ref-tag">—' + esc(item.ref) + '</span>' : '') + '</div>';
      if (item.children) html += buildOutlineHTML(item.children);
      html += '</div>';
    } else if (item.type === 'bullet') {
      html += '<div class="ol-bullets"><div class="ol-bullet"><span>' + esc(item.text) + (item.ref ? ' <span class="ref-tag">—' + esc(item.ref) + '</span>' : '') + '</span></div></div>';
    }
  });
  return html;
}

async function loadSummary(idx) {
var body = document.getElementById(‘summaryBody’);
if (!body) return;
if (summaryCache[idx]) { renderSummary(summaryCache[idx]); return; }

var d = getDaysData()[idx];
var text = (d.feeding + ‘\n\n’ + d.message).substring(0, 2500);

try {
var res = await fetch(‘https://api.anthropic.com/v1/messages’, {
method: ‘POST’,
headers: { ‘Content-Type’: ‘application/json’ },
body: JSON.stringify({
model: ‘claude-sonnet-4-20250514’,
max_tokens: 1000,
messages: [{ role: ‘user’, content: ‘以下是晨興聖言靈修內容，請用繁體中文整理重點。只輸出純JSON，不要加任何其他文字、標點或markdown符號：\n\n’ + text + ‘\n\n輸出格式如下：\n{“core_verse”:“本段最核心的一節經文或句子（35字內）”,“key_points”:[“重點1（30字內）”,“重點2（30字內）”,“重點3（30字內）”],“application”:“今日默想與應用方向（45字內）”}’ }]
})
});
var data = await res.json();
var raw = ((data.content && data.content[0] && data.content[0].text) || ‘{}’).replace(/`json|`/g, ‘’).trim();
var parsed = JSON.parse(raw);
summaryCache[idx] = parsed;
if (document.getElementById(‘summaryBody’)) renderSummary(parsed);
} catch(e) {
var b = document.getElementById(‘summaryBody’);
if (b) b.innerHTML = ‘<div style="color:var(--ink-faint);font-size:13px;line-height:1.8">AI 整理暫時無法使用，請直接閱讀完整內容。</div>’;
}
}

function renderSummary(s) {
var body = document.getElementById(‘summaryBody’);
if (!body) return;
var html = ‘<ul class="summary-points">’;
(s.key_points || []).forEach(function(pt, i) {
html += ‘<li class="summary-point"><div class="point-bullet">’ + (i+1) + ‘</div><div>’ + esc(pt) + ‘</div></li>’;
});
html += ‘</ul>’;
if (s.core_verse) html += ‘<div class="core-verse">「’ + esc(s.core_verse) + ‘」</div>’;
if (s.application) html += ’<div class="application-box">💭 ’ + esc(s.application) + ‘</div>’;
body.innerHTML = html;
}

URL.revokeObjectURL(url);

function flattenOutline(items, lines, depth) {
if (!items) return;
var indent = ’  ’.repeat(depth);
items.forEach(function(item) {
var ref = item.ref ? ‘（’ + item.ref + ‘）’ : ‘’;
if (item.type === ‘part’) lines.push(indent + ’▍ ’ + item.text + ref);
else if (item.type === ‘section’) lines.push(indent + item.text + ref);
else if (item.type === ‘sub’) lines.push(indent + item.num + ’ ’ + item.text + ref);
else if (item.type === ‘bullet’) lines.push(indent + ’— ’ + item.text + ref);
if (item.children) flattenOutline(item.children, lines, depth + 1);
});
}

function loadAiResult(idx) {
try { return localStorage.getItem(‘mr_ai_’ + getWeekData().weekId + ‘*’ + idx) || ‘’; } catch(e) { return ‘’; }
}
function saveAiResult() {
var area = document.getElementById(‘aiResultArea’);
var saved = document.getElementById(‘aiResultSaved’);
if (!area) return;
try { localStorage.setItem(’mr_ai*’ + getWeekData().weekId + ‘_’ + currentDay, area.value); } catch(e) {}
if (saved) {
saved.textContent = ‘已儲存 ✓’;
saved.classList.add(‘shown’);
setTimeout(function() { saved.classList.remove(‘shown’); saved.textContent = ‘’; }, 2000);
}
}

function esc(str) {
return (str || ‘’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’);
}
